author: Vincent5201
date: 2026-03-13
question: |
  大抄中提到從 fresh state 過渡到 steady state 開始 GC 的過程，消費級 SSD（7% OP）大約寫
  滿 1 次之後就會進入 steady state，企業級 SSD（28% OP），可能需要寫滿 1-2 次，原因是什麼 ?
options:
  - text: "企業級 SSD 的 128% 總容量較大，把它們寫滿後才會開始 GC"
    explanation: |
      並非寫滿全部容量才開始 GC，這並非 OP 區域的功能。
  - text: "較大的 OP 區域讓 SSD 有位置可以跑 Wear Leveling"
    explanation: |
      敘述正確但與此題無關，進入 steady state 是因為開始 GC 不是 Wear Leveling。
  - text: "企業級 SSD 有較大的 FTL，比較不會發生 Cache Miss"
    explanation: |
      敘述正確但與此題無關，不會發生 Cache Miss 可以讓查表很快但與是否啟動 GC 無關。
  - text: "較大的 OP 使 SSD 可以容納更多 invalid pages，較晚開始 GC"
    correct: true
    explanation: |
      當用戶空間寫滿後，後續寫入開始讓舊資料變成 Invalid，而 OP 越大就像是垃圾桶越大，
      可以讓你塞進更多廢棄資料而不必立刻去倒垃圾（觸發 GC）。
